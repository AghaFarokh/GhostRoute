name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/root/iraniexchange"
            REPO="https://github.com/AghaFarokh/GhostRoute.git"

            cd "$DEPLOY_DIR"

            # First-time setup: initialize git if not already done
            if [ ! -d .git ]; then
              git init
              git remote add origin "$REPO"
            fi

            # Pull latest code (only tracked files, .env is safe in .gitignore)
            git fetch origin master
            git checkout origin/master -- main.py lang.py requirements.txt

            # Install any new dependencies
            ./venv/bin/pip install -q -r requirements.txt

            # Restart the bot
            systemctl restart iraniexchange

            echo "Deploy complete. Status:"
            systemctl is-active iraniexchange
